name: Package installers

# Construit les installeurs natifs (.msi Windows, .dmg macOS) via jpackage. Déclenché
# sur un tag de version (vX.Y.Z) ou manuellement. Sur un tag, chaque installeur est
# attaché à une Release GitHub (page de téléchargement permanente) en plus des
# artefacts du run.
#
# NB : le runner macOS coûte 10× les minutes CI du plan gratuit (vs Linux/Windows) —
# accepté à partir de v1.4.0 pour distribuer un .dmg en plus du .msi (postes cibles
# principaux = Windows, mais usage/tests aussi sur Mac).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write        # nécessaire pour créer/mettre à jour la Release

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            type: msi
          - os: macos-latest
            type: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Installer le JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Installer WiX (Windows, requis par jpackage pour le .msi)
        if: runner.os == 'Windows'
        run: choco install wixtoolset --no-progress -y

      - name: Construire l'installeur
        shell: bash
        run: ./scripts/package.sh ${{ matrix.type }}

      - name: Publier l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: atlan-mfo-${{ matrix.os }}
          path: target/installer/*
          if-no-files-found: error

      # Sur un tag : attacher l'installeur à la Release GitHub (via gh CLI, pré-installé).
      # Idempotent : chaque job (Windows/macOS) crée la release si absente puis y ajoute
      # son installeur. Page de téléchargement permanente, sans expiration.
      - name: Publier dans la Release GitHub
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" --title "Patrimium MFO Dashboard $tag" \
            --notes "Installeurs natifs (.msi Windows, .dmg macOS). Voir DEPLOYMENT.md." \
            2>/dev/null || true
          gh release upload "$tag" target/installer/* --clobber
